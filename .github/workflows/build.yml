name: Build APK — The Mystic One

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Show project structure
        run: |
          echo "=== ROOT ==="
          ls -la
          echo "=== gradle/wrapper ==="
          find . -name "gradle-wrapper.properties" 2>/dev/null || echo "NOT FOUND"
          find . -name "gradlew" 2>/dev/null || echo "gradlew NOT FOUND"
          find . -name "build.gradle" 2>/dev/null || echo "build.gradle NOT FOUND"

      - name: Setup Gradle wrapper
        run: |
          # Create wrapper properties in ALL possible locations
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          networkTimeout=10000
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # Download the wrapper jar
          curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

          chmod +x gradlew
          echo "=== Wrapper ready ==="
          ls -la gradle/wrapper/

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build APK
        run: |
          ./gradlew assembleDebug --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g -Dfile.encoding=UTF-8"
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Find and rename APK
        run: |
          mkdir -p artifacts
          APK=$(find . -name "*.apk" -not -path "*/intermediates/*" | head -1)
          echo "Found APK: $APK"
          cp "$APK" artifacts/TheMysticOne.apk
          echo "APK size: $(du -sh artifacts/TheMysticOne.apk)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheMysticOne-APK
          path: artifacts/TheMysticOne.apk
          retention-days: 30

      - name: Get date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "The Mystic One v${{ github.run_number }} — ${{ steps.date.outputs.date }}"
          body: |
            ## ✦ The Mystic One — APK Android

            **Installation :**
            1. Telecharger `TheMysticOne.apk`
            2. Android : Parametres → Securite → Sources inconnues → Autoriser
            3. Ouvrir le fichier APK → Installer
            4. Lancer l'app → ⚙️ → Entrer votre cle Anthropic → Sauvegarder

            **Cle API gratuite :** https://console.anthropic.com
          files: artifacts/TheMysticOne.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
