name: Build APK — The Mystic One

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mystic

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle wrapper
        working-directory: mystic
        run: |
          mkdir -p gradle/wrapper
          printf 'distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-8.4-bin.zip\nnetworkTimeout=10000\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n' \
            > gradle/wrapper/gradle-wrapper.properties
          curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          echo "=== Structure ==="
          ls -la
          echo "=== app/ ==="
          ls -la app/

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('mystic/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        working-directory: mystic
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"

      - name: Copy APK to artifacts
        working-directory: mystic
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk artifacts/TheMysticOne.apk
          echo "APK size: $(du -sh artifacts/TheMysticOne.apk)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheMysticOne-APK
          path: mystic/artifacts/TheMysticOne.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "The Mystic One v${{ github.run_number }}"
          body: |
            ## ✦ The Mystic One — APK Android

            **Installation :**
            1. Telecharger `TheMysticOne.apk`
            2. Android : Parametres → Securite → Sources inconnues → Autoriser
            3. Ouvrir APK → Installer
            4. Lancer → ⚙️ → Entrer cle Anthropic → Sauvegarder

            **Cle API gratuite :** https://console.anthropic.com
          files: mystic/artifacts/TheMysticOne.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
