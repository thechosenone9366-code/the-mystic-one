name: Build APK — The Mystic One

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"

      - name: Build Debug APK (fallback)
        if: failure()
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"

      - name: Rename APK
        run: |
          mkdir -p artifacts
          if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk artifacts/TheMysticOne.apk
          elif [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk artifacts/TheMysticOne.apk
          elif [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            cp app/build/outputs/apk/debug/app-debug.apk artifacts/TheMysticOne.apk
          fi
          echo "APK size: $(du -sh artifacts/TheMysticOne.apk)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheMysticOne-APK
          path: artifacts/TheMysticOne.apk
          retention-days: 30

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "The Mystic One v${{ github.run_number }} — ${{ steps.date.outputs.date }}"
          body: |
            ## ✦ The Mystic One — APK Android

            ### Installation
            1. Telecharger TheMysticOne.apk
            2. Sur Android : Parametres -> Securite -> Sources inconnues
            3. Ouvrir le fichier APK -> Installer
            4. Lancer l'app -> Parametres -> entrer votre cle Anthropic

            ### Cle API gratuite
            https://console.anthropic.com
          files: artifacts/TheMysticOne.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
